<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>자원 애니메이션 테스트</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #2d5a3f; font-family: system-ui; color: #fff; height: 100dvh; display: flex; flex-direction: column; }

        /* Resource bar - same as game */
        .res-bar { display: flex; gap: 4px; padding: 8px 12px; }
        .res-slot {
            flex: 1; display: flex; align-items: center; justify-content: center; gap: 4px;
            padding: 8px 4px; border-radius: 8px; position: relative; overflow: visible;
            background: linear-gradient(180deg, #4a3520 0%, #3a2815 100%);
            border: 2px solid #5a4530;
            min-width: 0;
        }
        .res-slot.locked { background: rgba(30,20,10,0.5); border-color: rgba(50,40,30,0.5); }
        .res-slot img { width: 20px; height: 20px; object-fit: contain; }
        .res-val { font-family: 'Fredoka', sans-serif; font-size: 15px; color: #fde68a; }
        .res-slot.locked .res-val { color: rgba(255,255,255,0.25); }

        /* Delta animation - floats down gently */
        .delta {
            position: absolute; bottom: -14px; left: 50%; font-family: 'Fredoka', sans-serif;
            font-size: 13px; font-weight: 700; pointer-events: none; white-space: nowrap;
            animation: floatDown 1s ease-out forwards;
        }
        .delta.plus { color: #4ade80; }
        .delta.minus { color: #f87171; }

        @keyframes floatDown {
            0% { opacity: 1; transform: translateX(-50%) translateY(0); }
            60% { opacity: 1; }
            100% { opacity: 0; transform: translateX(-50%) translateY(12px); }
        }

        /* Slot bounce */
        .res-slot.bounce {
            animation: slotBounce 0.3s ease-out;
        }

        @keyframes slotBounce {
            0% { transform: translateY(0); }
            30% { transform: translateY(3px); }
            60% { transform: translateY(-1px); }
            100% { transform: translateY(0); }
        }

        /* Controls */
        .spacer { flex: 1; }
        .controls { background: #111; padding: 16px; overflow-y: auto; }
        .res-control { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; padding: 8px; background: #1a1a1a; border-radius: 10px; }
        .res-control img { width: 28px; height: 28px; }
        .res-control .name { width: 50px; font-size: 13px; font-weight: bold; }
        .res-control .amount { width: 60px; text-align: right; font-family: monospace; font-size: 15px; color: #4ade80; }
        .btns { display: flex; gap: 4px; flex: 1; justify-content: flex-end; }
        .btn { padding: 6px 10px; border: none; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; }
        .btn-add { background: #22c55e; color: #fff; }
        .btn-sub { background: #ef4444; color: #fff; }
    </style>
</head>
<body>
    <!-- Fake resource bar (same design as game) -->
    <div class="res-bar" id="resBar"></div>

    <div class="spacer" style="display:flex;align-items:center;justify-content:center;color:#4a7a5a;font-size:13px;">
        아래 버튼으로 자원을 추가/제거하세요
    </div>

    <!-- Controls -->
    <div class="controls" id="controls"></div>

    <script>
        const RES = [
            { id: 'wood', name: '나무', img: 'assets/generated/resources/wood.png', amount: 1200, unlocked: true },
            { id: 'flower', name: '꽃', img: 'assets/generated/resources/flower.png', amount: 400, unlocked: true },
            { id: 'stone', name: '돌', img: 'assets/generated/resources/stone.png', amount: 600, unlocked: true },
            { id: 'metal', name: '금속', img: 'assets/generated/resources/metal.png', amount: 0, unlocked: false },
            { id: 'gem', name: '보석', img: 'assets/generated/resources/gem.png', amount: 0, unlocked: false },
        ];

        function renderBar() {
            document.getElementById('resBar').innerHTML = RES.map(r => `
                <div class="res-slot ${r.unlocked ? '' : 'locked'}" id="slot-${r.id}">
                    <img src="${r.img}" alt="${r.name}">
                    <span class="res-val" id="val-${r.id}">${r.unlocked ? r.amount.toLocaleString() : '🔒'}</span>
                </div>
            `).join('');
        }

        function renderControls() {
            document.getElementById('controls').innerHTML = RES.map(r => `
                <div class="res-control">
                    <img src="${r.img}" alt="${r.name}">
                    <span class="name">${r.name}</span>
                    <span class="amount" id="ctrl-${r.id}">${r.amount.toLocaleString()}</span>
                    <div class="btns">
                        <button class="btn btn-sub" onclick="change('${r.id}', -100)">-100</button>
                        <button class="btn btn-sub" onclick="change('${r.id}', -500)">-500</button>
                        <button class="btn btn-add" onclick="change('${r.id}', +100)">+100</button>
                        <button class="btn btn-add" onclick="change('${r.id}', +500)">+500</button>
                    </div>
                </div>
            `).join('');
        }

        function change(id, delta) {
            const r = RES.find(x => x.id === id);
            if (!r) return;

            // Unlock if adding to locked resource
            if (!r.unlocked && delta > 0) {
                r.unlocked = true;
            }

            r.amount = Math.max(0, r.amount + delta);

            // Update displays
            const valEl = document.getElementById('val-' + id);
            valEl.textContent = r.unlocked ? r.amount.toLocaleString() : '🔒';

            // Bounce the whole slot
            const slotEl = document.getElementById('slot-' + id);
            slotEl.classList.remove('bounce');
            void slotEl.offsetWidth;
            slotEl.classList.add('bounce');

            const ctrlEl = document.getElementById('ctrl-' + id);
            ctrlEl.textContent = r.amount.toLocaleString();

            const slotEl = document.getElementById('slot-' + id);
            slotEl.classList.toggle('locked', !r.unlocked);

            // Show delta animation
            const deltaEl = document.createElement('span');
            deltaEl.className = 'delta ' + (delta > 0 ? 'plus' : 'minus');
            deltaEl.textContent = (delta > 0 ? '+' : '') + delta.toLocaleString();
            slotEl.appendChild(deltaEl);
            setTimeout(() => deltaEl.remove(), 1300);
        }

        renderBar();
        renderControls();
    </script>
</body>
</html>
