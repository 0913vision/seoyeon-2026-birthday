<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>캘리브레이션</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #2d5a3f; font-family: system-ui; color: #fff; overflow: hidden; height: 100dvh; }
        #canvas { width: 100%; height: 45%; display: block; touch-action: none; }
        #panel {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.9); padding: 10px 12px 80px; font-size: 12px;
            height: 55%; overflow-y: scroll; z-index: 10;
            -webkit-overflow-scrolling: touch;
            touch-action: pan-y;
            overscroll-behavior: contain;
        }
        .tab { display: inline-block; padding: 6px 14px; border-radius: 6px 6px 0 0; cursor: pointer; font-weight: bold; font-size: 13px; }
        .tab.active { background: #f59e0b; color: #000; }
        .tab:not(.active) { background: #333; color: #aaa; }
        .row { display: flex; gap: 4px; align-items: center; margin: 4px 0; }
        .label { min-width: 75px; color: #aaa; font-size: 11px; }
        input[type=range] { flex: 1; }
        .pm { width: 28px; height: 28px; background: #444; color: #fff; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .pm:active { background: #666; }
        .num-input { width: 55px; background: #222; color: #4ade80; border: 1px solid #555; border-radius: 4px; padding: 3px 4px; font-size: 12px; font-family: monospace; text-align: center; }
        select { padding: 4px 8px; font-size: 12px; background: #222; color: #fff; border: 1px solid #555; border-radius: 4px; }
        button { background: #3b82f6; color: #fff; border: none; padding: 8px 16px; border-radius: 6px; font-weight: bold; margin: 6px 2px; font-size: 13px; }
        #output { margin-top: 6px; padding: 8px; background: rgba(255,255,255,0.08); border-radius: 6px; font-family: monospace; font-size: 10px; white-space: pre-wrap; word-break: break-all; max-height: 120px; overflow-y: auto; }
        .section-title { color: #f59e0b; font-size: 12px; font-weight: bold; margin: 10px 0 4px; border-bottom: 1px solid #333; padding-bottom: 4px; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="panel">
        <div class="section-title">🌿 타일 기울기 (전체)</div>
        <div id="tileControls"></div>

        <div class="section-title">🏗 건물별 세팅 (빨간 점 = 타일 중앙, 건물 바닥을 맞추세요)</div>
        <div class="row">
            <span class="label">건물 선택:</span>
            <select id="buildingSelect"></select>
        </div>
        <div id="buildingControls"></div>

        <div id="output"></div>
        <button onclick="copyAll()">전체 값 복사</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const dpr = window.devicePixelRatio || 1;
        const TILE_W = 110, TILE_H = 55;

        // Tile settings
        let tileOffY = 0;
        let tileSideH = 6;

        // Building data
        const buildings = [
            { id: 'woodfarm', name: '나무밭', path: 'assets/generated/buildings/wood_farm.png', originY: 0.71, scale: 1.2, offX: 0, offY: 0 },
            { id: 'flowerfarm', name: '꽃밭', path: 'assets/generated/buildings/flower_farm.png', originY: 0.56, scale: 1.1, offX: 0, offY: -2 },
            { id: 'quarry', name: '채석장', path: 'assets/generated/buildings/quarry.png', originY: 0.62, scale: 1.05, offX: 0, offY: -2 },
            { id: 'woodshop', name: '목공방', path: 'assets/generated/buildings/woodshop.png', originY: 0.63, scale: 1.25, offX: 0.5, offY: -3 },
            { id: 'mine', name: '광산', path: 'assets/generated/buildings/mine.png', originY: 0.59, scale: 1.1, offX: 3, offY: -3.5 },
            { id: 'jewelshop', name: '세공소', path: 'assets/generated/buildings/jewelshop.png', originY: 0.69, scale: 1.1, offX: -0.5, offY: -2 },
            { id: 'gemcave', name: '수정동굴', path: 'assets/generated/buildings/gem_cave.png', originY: 0.64, scale: 1.1, offX: 0, offY: -3 },
            { id: 'box_stage1', name: '🎁 상자 1단계', path: 'assets/generated/giftbox/box_stage1_base.png', originY: 0.55, scale: 1.25, offX: 0.5, offY: -4 },
            { id: 'box_stage2', name: '🎁 상자 2단계', path: 'assets/generated/giftbox/box_stage2_frame.png', originY: 0.64, scale: 1.25, offX: 0.5, offY: -4 },
            { id: 'box_stage3', name: '🎁 상자 3단계', path: 'assets/generated/giftbox/box_stage3_flowers.png', originY: 0.63, scale: 1.25, offX: 0.5, offY: -4 },
            { id: 'box_stage4', name: '🎁 상자 4단계', path: 'assets/generated/giftbox/box_stage4_numbers.png', originY: 0.64, scale: 1.25, offX: 0.5, offY: -4 },
            { id: 'box_stage5', name: '🎁 상자 5단계', path: 'assets/generated/giftbox/box_stage5_metal.png', originY: 0.67, scale: 1.25, offX: 0.5, offY: -4 },
            { id: 'box_stage6', name: '🎁 상자 6단계', path: 'assets/generated/giftbox/box_stage6_complete.png', originY: 0.65, scale: 1.05, offX: 0.5, offY: -4 },
            { id: 'box_stage7', name: '🎁 상자 7단계', path: 'assets/generated/giftbox/box_stage7_packaging.png', originY: 0.63, scale: 1.15, offX: -0.5, offY: -4 },
            { id: 'box_stage8', name: '🎁 상자 8단계', path: 'assets/generated/giftbox/box_stage8_wrapped.png', originY: 0.65, scale: 1.05, offX: 0.5, offY: -4 },
            { id: 'flower_patch', name: '꽃', path: 'assets/generated/terrain/flower_patch.png', originY: 0.64, scale: 1.6, offX: 0, offY: 0 },
            { id: 'rock_outcrop', name: '바위', path: 'assets/generated/terrain/rock_outcrop.png', originY: 0.58, scale: 2.4, offX: 6, offY: 0 },
            { id: 'cave_entrance', name: '동굴', path: 'assets/generated/terrain/cave_entrance.png', originY: 0.61, scale: 2, offX: -2.5, offY: -1 },
            { id: 'crystal_cluster', name: '수정', path: 'assets/generated/terrain/crystal_cluster.png', originY: 0.72, scale: 1.7, offX: 0, offY: 0 },
            { id: 'merchant_truck', name: '🚛 가죽상인', path: 'assets/generated/terrain/merchant_truck.png', originY: 0.56, scale: 1.85, offX: 0, offY: -20 },
            { id: 'secret_doc', name: '📜 비밀문서', path: 'assets/generated/terrain/secret_doc.png', originY: 0.6, scale: 1.0, offX: 0, offY: 0 },
        ];
        let currentBuilding = 0;
        const imgs = {};

        // Load images
        const select = document.getElementById('buildingSelect');
        buildings.forEach((b, i) => {
            const opt = document.createElement('option');
            opt.value = i; opt.textContent = b.name;
            select.appendChild(opt);
            const img = new Image();
            img.onload = () => { imgs[b.id] = img; draw(); };
            img.src = b.path;
        });

        // Generate controls
        function makeControl(container, id, label, min, max, step, value) {
            const html = `
                <div class="row">
                    <span class="label">${label}:</span>
                    <button class="pm" onclick="adj('${id}', -${step})">−</button>
                    <input type="range" id="${id}" min="${min}" max="${max}" step="${step}" value="${value}">
                    <button class="pm" onclick="adj('${id}', ${step})">+</button>
                    <input type="number" class="num-input" id="${id}Num" value="${value}" step="${step}" onchange="syncFromNum('${id}')">
                </div>`;
            container.insertAdjacentHTML('beforeend', html);
            document.getElementById(id).addEventListener('input', (e) => {
                document.getElementById(id + 'Num').value = e.target.value;
                draw();
            });
        }

        // Tile global controls
        const tileContainer = document.getElementById('tileControls');
        makeControl(tileContainer, 'gTileRatio', '타일 비율 (높이)', 0.3, 0.7, 0.01, 0.58);

        // Building controls
        const buildingContainer = document.getElementById('buildingControls');
        makeControl(buildingContainer, 'bOriginY', 'Origin Y', 0.5, 1.0, 0.01, 0.85);
        makeControl(buildingContainer, 'bScale', 'Scale', 0.3, 2.5, 0.05, 1.0);
        makeControl(buildingContainer, 'bOffX', 'X 오프셋 (좌우)', -30, 30, 0.5, 0);
        makeControl(buildingContainer, 'bOffY', 'Y 오프셋 (상하)', -30, 30, 0.5, 0);

        function adj(id, delta) {
            const el = document.getElementById(id);
            const v = Math.round((parseFloat(el.value) + delta) * 100) / 100;
            el.value = Math.max(parseFloat(el.min), Math.min(parseFloat(el.max), v));
            document.getElementById(id + 'Num').value = el.value;
            draw();
        }

        function syncFromNum(id) {
            document.getElementById(id).value = document.getElementById(id + 'Num').value;
            draw();
        }

        // Building select
        select.addEventListener('change', (e) => {
            saveCurrent();
            currentBuilding = parseInt(e.target.value);
            loadCurrent();
            draw();
        });

        function saveCurrent() {
            buildings[currentBuilding].originY = parseFloat(document.getElementById('bOriginY').value);
            buildings[currentBuilding].scale = parseFloat(document.getElementById('bScale').value);
            buildings[currentBuilding].offX = parseFloat(document.getElementById('bOffX').value);
            buildings[currentBuilding].offY = parseFloat(document.getElementById('bOffY').value);
        }

        function loadCurrent() {
            const b = buildings[currentBuilding];
            const map = { bOriginY: 'originY', bScale: 'scale', bOffX: 'offX', bOffY: 'offY' };
            for (const [elId, key] of Object.entries(map)) {
                const val = b[key] !== undefined ? b[key] : 0;
                document.getElementById(elId).value = val;
                document.getElementById(elId + 'Num').value = val;
            }
        }

        // Resize
        function resize() {
            const h = window.innerHeight * 0.45;
            canvas.width = window.innerWidth * dpr;
            canvas.height = h * dpr;
            canvas.style.width = window.innerWidth + 'px';
            canvas.style.height = h + 'px';
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            draw();
        }
        window.addEventListener('resize', resize);
        loadCurrent(); // sync sliders with building data on page load
        resize();

        function toScreen(row, col) {
            const cx = window.innerWidth / 2;
            const cy = canvas.height / dpr * 0.45;
            return { x: (col - row) * (TILE_W / 2) + cx, y: (col + row) * (TILE_H / 2) + cy };
        }

        function drawTile(x, y, isLight, tileH, sideH) {
            const GREEN_L = '#5cb85c', GREEN_D = '#4ea84e';
            const SIDE_L = '#4a8a3a', SIDE_R = '#3d7530';

            // Top face
            ctx.fillStyle = isLight ? GREEN_L : GREEN_D;
            ctx.beginPath();
            ctx.moveTo(x, y - tileH / 2);
            ctx.lineTo(x + TILE_W / 2, y);
            ctx.lineTo(x, y + tileH / 2);
            ctx.lineTo(x - TILE_W / 2, y);
            ctx.closePath();
            ctx.fill();

            // Left side
            if (sideH > 0) {
                ctx.fillStyle = SIDE_L;
                ctx.beginPath();
                ctx.moveTo(x - TILE_W / 2, y);
                ctx.lineTo(x, y + tileH / 2);
                ctx.lineTo(x, y + tileH / 2 + sideH);
                ctx.lineTo(x - TILE_W / 2, y + sideH);
                ctx.closePath();
                ctx.fill();

                ctx.fillStyle = SIDE_R;
                ctx.beginPath();
                ctx.moveTo(x + TILE_W / 2, y);
                ctx.lineTo(x, y + tileH / 2);
                ctx.lineTo(x, y + tileH / 2 + sideH);
                ctx.lineTo(x + TILE_W / 2, y + sideH);
                ctx.closePath();
                ctx.fill();
            }
        }

        function draw() {
            const ch = canvas.height / dpr;
            ctx.clearRect(0, 0, window.innerWidth, ch);

            const tileRatio = parseFloat(document.getElementById('gTileRatio').value);
            const actualTileH = TILE_W * tileRatio;
            const sideH = actualTileH * 0.1;
            const b = buildings[currentBuilding];
            b.originY = parseFloat(document.getElementById('bOriginY').value);
            b.scale = parseFloat(document.getElementById('bScale').value);

            // Draw 5x5 grid of tiles with adjusted height
            for (let r = -2; r <= 2; r++) {
                for (let c = -2; c <= 2; c++) {
                    // Use adjusted tile height for screen position
                    const cx = window.innerWidth / 2;
                    const cy = canvas.height / dpr * 0.5;
                    const x = (c - r) * (TILE_W / 2) + cx;
                    const y = (c + r) * (actualTileH / 2) + cy;
                    const isLight = (r + c) % 2 === 0;
                    drawTile(x, y, isLight, actualTileH, sideH);
                }
            }

            // Draw building on center tile
            const img = imgs[b.id];
            if (img) {
                const cx2 = window.innerWidth / 2;
                const cy2 = canvas.height / dpr * 0.5;
                const bx = cx2 + (b.offX || 0);
                const by = cy2 + (b.offY || 0);
                const w = TILE_W * b.scale;
                const h = w * (img.height / img.width);
                ctx.drawImage(img, bx - w / 2, by - h * b.originY, w, h);

                // Tile diamond guide lines (left/right/bottom vertices)
                const leftVx = cx2 - TILE_W / 2;
                const rightVx = cx2 + TILE_W / 2;
                const bottomVy = cy2 + actualTileH / 2;

                // Draw tile outline highlight
                ctx.strokeStyle = 'rgba(255,0,0,0.5)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(leftVx, cy2);       // left vertex
                ctx.lineTo(cx2, bottomVy);      // bottom vertex
                ctx.lineTo(rightVx, cy2);       // right vertex
                ctx.stroke();

                // Vertex dots
                ctx.fillStyle = 'rgba(255,0,0,0.8)';
                [
                    [leftVx, cy2],
                    [rightVx, cy2],
                    [cx2, bottomVy],
                ].forEach(([px, py]) => {
                    ctx.beginPath();
                    ctx.arc(px, py, 4, 0, Math.PI * 2);
                    ctx.fill();
                });

                // Labels
                ctx.fillStyle = 'rgba(255,255,255,0.7)';
                ctx.font = '9px system-ui';
                ctx.textAlign = 'center';
                ctx.fillText('◀ 좌', leftVx - 12, cy2 - 5);
                ctx.fillText('우 ▶', rightVx + 12, cy2 - 5);
                ctx.fillText('▼ 하', cx2, bottomVy + 14);
            }

            updateOutput();
        }

        function updateOutput() {
            saveCurrent();

            let text = `tileRatio: ${document.getElementById('gTileRatio').value} (TILE_H = TILE_W * ${document.getElementById('gTileRatio').value})\n\n`;
            buildings.forEach(b => {
                text += `${b.id}: { originY: ${b.originY}, scale: ${b.scale}, offX: ${b.offX}, offY: ${b.offY} }\n`;
            });
            document.getElementById('output').textContent = text;
        }

        function copyAll() {
            saveCurrent();
            const text = document.getElementById('output').textContent;
            navigator.clipboard.writeText(text).then(() => alert('복사됨!'));
        }
    </script>
</body>
</html>
