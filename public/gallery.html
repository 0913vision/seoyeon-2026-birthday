<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>에셋 갤러리</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; color: #fff; font-family: system-ui, sans-serif; padding: 16px; }
        h1 { text-align: center; margin-bottom: 20px; font-size: 20px; }
        h2 { margin: 20px 0 10px; font-size: 16px; color: #f59e0b; border-bottom: 1px solid #333; padding-bottom: 6px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
        .card { background: #2a2a3e; border-radius: 12px; padding: 8px; text-align: center; }
        .card img { width: 100%; aspect-ratio: 1; object-fit: contain; background: repeating-conic-gradient(#3a3a4e 0% 25%, #2a2a3e 0% 50%) 50% / 20px 20px; border-radius: 8px; }
        .card .name { font-size: 11px; margin-top: 6px; color: #aaa; word-break: break-all; }
        .pink .card img { background: #FFB4C8; }
        .toggle { text-align: center; margin: 16px 0; }
        .toggle button { background: #f59e0b; color: #000; border: none; padding: 8px 20px; border-radius: 20px; font-weight: bold; font-size: 14px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>🎁 에셋 갤러리</h1>
    <div class="toggle">
        <button onclick="document.body.classList.toggle('pink')">배경 전환 (체크무늬/핑크)</button>
    </div>

    <h2>🏗 건물 (7종)</h2>
    <div class="grid" id="buildings"></div>

    <h2>🎁 선물상자 (4단계)</h2>
    <div class="grid" id="giftbox"></div>

    <h2>💎 자원 아이콘 (5종)</h2>
    <div class="grid" id="resources"></div>

    <h2>🔧 파츠 (24종)</h2>
    <div class="grid" id="parts"></div>

    <h2>🌿 지형 타일 (4종)</h2>
    <div class="grid" id="terrain"></div>

    <script>
        const assets = {
            buildings: ['wood_farm','flower_farm','quarry','woodshop','mine','jewelshop','gem_cave'],
            giftbox: ['box_empty','box_half','box_complete','box_wrapped'],
            resources: ['wood','flower','stone','metal','gem'],
            parts: Array.from({length:24}, (_,i) => {
                const names = ['base','body','front','back','lid','flower_a','wreath','number2','number4','pedestal','handle','buckle','trim','crystal_star','gem_deco','metal_frame','flower_crown','gem_ribbon','carved_plate','crystal_crown','main_ribbon','happy24_banner','firework','final_knot'];
                return 'part_' + String(i+1).padStart(2,'0') + '_' + names[i];
            }),
            terrain: ['grass_light','grass_dark','dirt_path','stone_path'],
        };

        const labels = {
            wood_farm:'나무밭', flower_farm:'꽃밭', quarry:'채석장', woodshop:'목공방',
            mine:'광산', jewelshop:'세공소', gem_cave:'수정동굴',
            box_empty:'빈 상자', box_half:'반완성', box_complete:'완성', box_wrapped:'포장',
            wood:'나무', flower:'꽃', stone:'돌', metal:'금속', gem:'보석',
            grass_light:'밝은 잔디', grass_dark:'어두운 잔디', dirt_path:'흙길', stone_path:'돌길',
        };

        const partLabels = ['바닥판','몸통','앞면판','뒷면판','뚜껑','꽃 장식','꽃 화환','숫자2','숫자4','받침대','손잡이','버클','테두리','크리스탈 별','보석 장식','금속 프레임','꽃 왕관','보석 리본','장식판','크리스탈 왕관','메인 리본','HAPPY24','불꽃 장식','뚜껑 매듭'];

        for (const [section, names] of Object.entries(assets)) {
            const container = document.getElementById(section);
            names.forEach((name, i) => {
                const card = document.createElement('div');
                card.className = 'card';
                const label = section === 'parts' ? `${i+1}. ${partLabels[i]}` : (labels[name] || name);
                card.innerHTML = `<img src="assets/generated/${section}/${name}.png" alt="${name}" loading="lazy"><div class="name">${label}</div>`;
                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
